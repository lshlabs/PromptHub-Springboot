spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        # Supabase Transaction Pooler(PgBouncer) safe settings
        prepareThreshold: 0
        preparedStatementCacheQueries: 0
        preparedStatementCacheSizeMiB: 0
        preferQueryMode: simple
        reWriteBatchedInserts: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

app:
  cors:
    # 운영은 명시 allowlist가 없으면 CORS 허용하지 않는다.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
    allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${APP_CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With,X-Session-Key}
    exposed-headers: ${APP_CORS_EXPOSED_HEADERS:Authorization}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:false}
    max-age-seconds: ${APP_CORS_MAX_AGE_SECONDS:3600}
