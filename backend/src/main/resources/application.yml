spring:
  application:
    name: prompthub-spring

  profiles:
    default: local

  config:
    import: optional:file:.env[.properties], optional:file:../.env[.properties]

  datasource:
    hikari:
      data-source-properties:
        # Supabase Transaction Pooler(PgBouncer) compatibility
        prepareThreshold: 0
        preparedStatementCacheQueries: 0
        preparedStatementCacheSizeMiB: 0
        preferQueryMode: simple
        reWriteBatchedInserts: true

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8000}

app:
  cors:
    # 쉼표(,)로 구분된 allowlist. 운영에서는 APP_CORS_ALLOWED_ORIGINS를 명시 설정한다.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
    allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${APP_CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With,X-Session-Key}
    exposed-headers: ${APP_CORS_EXPOSED_HEADERS:Authorization}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:false}
    max-age-seconds: ${APP_CORS_MAX_AGE_SECONDS:3600}
  security:
    jwt:
      secret: ${APP_JWT_SECRET:prompthub-local-secret-change-me-prompthub-local-secret}
      access-expiration-ms: ${APP_JWT_ACCESS_EXPIRATION_MS:3600000}
      refresh-expiration-ms: ${APP_JWT_REFRESH_EXPIRATION_MS:1209600000}
    google:
      client-id: ${BACKEND_GOOGLE_CLIENT_ID:${NEXT_PUBLIC_GOOGLE_CLIENT_ID:test-client-id}}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    profile-folder: ${CLOUDINARY_PROFILE_FOLDER:prompthub/profile}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
