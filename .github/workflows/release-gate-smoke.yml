name: release-gate-smoke

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  smoke-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run release-gate smoke tests
        working-directory: backend
        run: |
          ./gradlew test \
            --tests com.lshlabs.prompthubspring.smoke.ReleaseGateSmokeTest \
            --tests com.lshlabs.prompthubspring.smoke.TrailingSlashCompatibilitySmokeTest \
            --tests com.lshlabs.prompthubspring.verification.Diff06ReleaseGateEvidenceVerificationTest
